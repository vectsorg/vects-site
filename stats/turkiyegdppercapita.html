        });

        // Language Engine Transition Routing
        function changeLanguage(lang) {
            currentLang = lang;
            currentLangLabel.innerText = i18n[lang].label;
            
            // Step 1: Scan and translate static DOM elements containing data-i18n attributes
            document.querySelectorAll('[data-i18n]').forEach(elem => {
                const key = elem.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    elem.innerText = i18n[lang][key];
                }
            });

            // Step 2: Dynamic input search input box placeholder transition 
            searchBar.placeholder = i18n[lang].placeholder_search;

            // Trigger complete dashboard component recalculation/repaint
            renderDashboard();
        }

        // Processing & Rendering Core Logic
        function renderDashboard() {
            const searchQuery = searchBar.value.toLowerCase().trim();
            const selectedRegion = regionFilter.value;
            const chosenSort = sortOrder.value;

            // Filter logic array step
            let filtered = provincesData.filter(prov => {
                const matchesSearch = prov.name.toLowerCase().includes(searchQuery);
                const matchesRegion = (selectedRegion === 'All' || prov.region === selectedRegion);
                return matchesSearch && matchesRegion;
            });

            // Sorting logic array step
            if (chosenSort === 'desc') {
                filtered.sort((a, b) => b.gdp - a.gdp);
            } else if (chosenSort === 'asc') {
                filtered.sort((a, b) => a.gdp - b.gdp);
            } else if (chosenSort === 'alpha') {
                filtered.sort((a, b) => a.name.localeCompare(b.name, 'tr'));
            }

            // Visual print execution step
            provinceGrid.innerHTML = '';
            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

                                </div>
                                <div class="text-right">
                                    <span class="text-lg font-extrabold text-gray-900">$${prov.gdp.toLocaleString()}</span>
                                    <p class="text-xs ${isAboveAverage ? 'text-emerald-600 font-semibold' : 'text-gray-400'}">${percentageOfAvg}% ${localOfAvgString}</p>
                                </div>
                            </div>
                        </div>
                        <div class="mt-4">
                            <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                                <div class="h-full rounded-full ${isAboveAverage ? 'bg-emerald-500' : 'bg-blue-500'}" style="width: ${barWidth}%"></div>
                            </div>
                        </div>
                    </div>
                `;
                provinceGrid.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // Component UI listeners
        searchBar.addEventListener('input', renderDashboard);
        regionFilter.addEventListener('change', renderDashboard);
        sortOrder.addEventListener('change', renderDashboard);

        // Boot system initialize defaults
        changeLanguage('en');
    </script>
</body>
</html>
